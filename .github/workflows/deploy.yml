name: Deploy to S3

on:
  push:
    branches:
      - main  # メインブランチにプッシュした時に実行

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # S3へアップロード（--deleteで削除差分も反映）
      - name: Deploy to S3
        run: aws s3 sync . s3://inu-app-frontend-20260612 --delete --exclude ".git/*" --exclude ".github/*"

      # CloudFrontのキャッシュを削除（サイトを即時更新するため）
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id EI9KCQPEHOWCG --paths "/*"
